<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>To-Do List</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg: #0b1220;
      --card: rgba(255,255,255,.06);
      --card2: rgba(255,255,255,.08);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --border: rgba(255,255,255,.14);
      --primary: #6d5efc;
      --primary2: #4dd6ff;
      --danger: #ff5c7a;
      --success: #22c55e;
      --shadow: 0 20px 60px rgba(0,0,0,.35);
      --radius: 18px;
    }

    *{ box-sizing: border-box; }
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(109,94,252,.35), transparent 55%),
        radial-gradient(800px 420px at 90% 20%, rgba(77,214,255,.25), transparent 55%),
        radial-gradient(700px 420px at 40% 100%, rgba(34,197,94,.14), transparent 60%),
        linear-gradient(180deg, #070c16 0%, var(--bg) 100%);
      min-height: 100vh;
      display:flex;
      align-items: center;
      justify-content: center;
      padding: 28px;
    }

    .container{ width: min(980px, 100%); }

    .hero{
      display:flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 16px;
    }

    .brand h1{
      margin:0;
      font-size: clamp(22px, 3vw, 30px);
      letter-spacing: .2px;
    }
    .brand p{
      margin:6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .pill{
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    @media (min-width: 860px){
      .grid{ grid-template-columns: 380px 1fr; }
    }

    .card{
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .card-header{
      padding: 16px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.06), transparent);
    }

    .card-header h2{ margin:0; font-size: 15px; letter-spacing: .2px; }
    .card-header p{ margin:6px 0 0; color: var(--muted); font-size: 12px; }

    .card-body{ padding: 16px; }

    label{ display:block; font-size: 12px; color: var(--muted); margin: 10px 0 6px; }

    .row{ display:flex; gap: 10px; }
    .row > *{ flex:1; }

    input, button{
      font: inherit;
      color: var(--text);
    }

    input{
      width:100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      outline: none;
      transition: .15s border-color, .15s transform;
    }

    input:focus{
      border-color: rgba(109,94,252,.65);
      transform: translateY(-1px);
    }

    .btn{
      width:100%;
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(135deg, rgba(109,94,252,.95), rgba(77,214,255,.55));
      font-weight: 600;
      cursor: pointer;
      transition: .15s transform, .15s filter;
    }
    .btn:hover{ transform: translateY(-1px); filter: brightness(1.05); }
    .btn:active{ transform: translateY(0px); }

    .btn.secondary{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 600;
    }

    .list{
      padding: 8px 0;
    }

    .item{
      display:flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    .item:first-child{ border-top: none; }

    .left{ display:flex; align-items: center; gap: 12px; min-width: 0; }

    .check{
      width: 22px; height: 22px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,.2);
      display:flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(0,0,0,.15);
      transition: .15s border-color, .15s background;
      flex: 0 0 auto;
    }

    .check.done{
      border-color: rgba(34,197,94,.7);
      background: rgba(34,197,94,.18);
    }

    .text{
      min-width:0;
    }

    .task{
      font-weight: 500;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 520px;
    }

    .meta{
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .task.done{ text-decoration: line-through; color: rgba(255,255,255,.55); }

    .actions{ display:flex; gap: 10px; }

    .icon-btn{
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      padding: 10px 12px;
      cursor:pointer;
      color: var(--text);
      transition: .15s transform, .15s filter;
    }

    .icon-btn:hover{ transform: translateY(-1px); filter: brightness(1.05); }

    .icon-btn.danger{
      border-color: rgba(255,92,122,.35);
      background: rgba(255,92,122,.12);
    }

    .empty{
      padding: 26px 16px;
      color: var(--muted);
      text-align: center;
    }

    .footer-note{
      margin-top: 12px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .status{
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      min-height: 16px;
    }

    .status strong{ color: var(--text); }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="brand">
        <h1>To‑Do List</h1>
        <p>Fast, clean UI backed by your Python API.</p>
      </div>
      <div class="pill">Local API: <strong id="apiUrl">/api</strong></div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="card-header">
          <h2>Add a task</h2>
          <p>Optionally set a due date (YYYY-MM-DD).</p>
        </div>
        <div class="card-body">
          <label for="taskText">Task</label>
          <input id="taskText" placeholder="e.g., Buy groceries" maxlength="200" />

          <div class="row">
            <div>
              <label for="taskDue">Due</label>
              <input id="taskDue" placeholder="YYYY-MM-DD" maxlength="10" />
            </div>
          </div>

          <div style="margin-top: 12px;">
            <button class="btn" id="addBtn">Add task</button>
          </div>

          <div style="margin-top: 10px;">
            <button class="btn secondary" id="refreshBtn">Refresh</button>
          </div>

          <div class="status" id="status"></div>
          <div class="footer-note">Data stored in <code>todos.json</code></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <h2>Tasks</h2>
          <p id="summary">—</p>
        </div>
        <div class="card-body">
          <div class="list" id="list"></div>
          <div class="empty" id="empty">No tasks yet. Add one on the left.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = (location.origin || "") + "/api";
    document.getElementById('apiUrl').textContent = '/api';

    const els = {
      taskText: document.getElementById('taskText'),
      taskDue: document.getElementById('taskDue'),
      addBtn: document.getElementById('addBtn'),
      refreshBtn: document.getElementById('refreshBtn'),
      list: document.getElementById('list'),
      empty: document.getElementById('empty'),
      status: document.getElementById('status'),
      summary: document.getElementById('summary'),
    };

    function setStatus(msg, isError=false){
      els.status.innerHTML = msg;
      els.status.style.color = isError ? 'rgba(255,92,122,.95)' : 'var(--muted)';
    }

    function esc(s){
      return String(s).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'<','>':'>','"':'"',"'":'&#39;'}[ch]));
    }

    function render(items){
      els.list.innerHTML = '';

      if(!items || items.length === 0){
        els.empty.style.display = 'block';
        els.summary.textContent = '0 tasks';
        return;
      }

      els.empty.style.display = 'none';

      const total = items.length;
      const done = items.filter(t => t.done).length;
      els.summary.textContent = `${done}/${total} completed`;

      // Sort like backend list view: incomplete first, then id.
      items = [...items].sort((a,b) => (a.done === b.done ? (a.id - b.id) : (a.done ? 1 : -1)));

      for(const t of items){
        const item = document.createElement('div');
        item.className = 'item';

        const left = document.createElement('div');
        left.className = 'left';

        const check = document.createElement('div');
        check.className = 'check' + (t.done ? ' done' : '');
        check.innerHTML = t.done ? '✓' : '';
        check.title = 'Toggle complete';
        check.onclick = () => toggleTask(t.id);

        const textWrap = document.createElement('div');
        textWrap.className = 'text';

        const task = document.createElement('div');
        task.className = 'task' + (t.done ? ' done' : '');
        task.textContent = t.text;

        const meta = document.createElement('div');
        meta.className = 'meta';
        const duePart = t.due ? `Due: ${t.due}` : 'No due date';
        const createdPart = t.created_at ? `Created: ${t.created_at}` : '';
        meta.textContent = `${duePart}${createdPart ? ' • ' + createdPart : ''}`;

        textWrap.appendChild(task);
        textWrap.appendChild(meta);

        left.appendChild(check);
        left.appendChild(textWrap);

        const actions = document.createElement('div');
        actions.className = 'actions';

        const del = document.createElement('button');
        del.className = 'icon-btn danger';
        del.textContent = 'Delete';
        del.onclick = () => deleteTask(t.id);

        actions.appendChild(del);

        item.appendChild(left);
        item.appendChild(actions);
        els.list.appendChild(item);
      }
    }

    async function fetchTodos(){
      setStatus('Loading...');
      const res = await fetch(API_BASE + '/todos');
      if(!res.ok){
        setStatus('Failed to load tasks', true);
        return;
      }
      const data = await res.json();
      render(data.todos || []);
      setStatus('');
    }

    async function addTask(){
      const text = els.taskText.value.trim();
      const due = els.taskDue.value.trim();

      if(!text){
        setStatus('Task text is required.', true);
        return;
      }

      setStatus('Adding task...');
      const res = await fetch(API_BASE + '/todos', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ text, due: due || null })
      });

      if(!res.ok){
        setStatus('Failed to add task', true);
        return;
      }

      els.taskText.value = '';
      els.taskDue.value = '';
      await fetchTodos();
    }

    async function toggleTask(id){
      const res = await fetch(API_BASE + `/todos/${id}/toggle`, { method: 'POST' });
      if(!res.ok){
        setStatus('Failed to update task', true);
        return;
      }
      await fetchTodos();
    }

    async function deleteTask(id){
      const ok = confirm('Delete this task?');
      if(!ok) return;

      const res = await fetch(API_BASE + `/todos/${id}`, { method: 'DELETE' });
      if(!res.ok){
        setStatus('Failed to delete task', true);
        return;
      }
      await fetchTodos();
    }

    els.addBtn.onclick = addTask;
    els.refreshBtn.onclick = fetchTodos;
    els.taskText.addEventListener('keydown', (e) => {
      if(e.key === 'Enter'){ addTask(); }
    });

    fetchTodos();
  </script>
</body>
</html>
